<!DOCTYPE html>
<html>
<head>
  <title>Invoice Alignment Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      color: red;
      width: 8.5in;
      height: 11in;
      position: relative;
      margin: 0 auto;
      border: 1px solid #ccc;
    }

    .bg-template {
      position: absolute;
      top: 0; left: 0;
      width: 8.5in;
      height: 11in;
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
    }
    .bg-template img {
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    .date-field, .reg-name, .tin-field, .address,
    .items-table, .vatable-sales, .vat-amount-left,
    .zero-rated, .vat-exempt, .total-vat-incl,
    .less-vat, .net-of-vat, .less-discount,
    .add-vat, .less-withholding, .total-due {
      z-index: 1;
      background: rgba(255,255,0,0.3);
    }

    /* Customer Info — LOCKED ✅ */
    .date-field { position: absolute; top: 1.65in;  left: 5.85in;  font-size: 15px; }
    .reg-name   { position: absolute; top: 2.26in;  left: 2.00in;  font-size: 15px; }
    .tin-field   { position: absolute; top: 2.60in;  left: 1.00in;  font-size: 15px; }
    .address    { position: absolute; top: 2.92in;  left: 2.00in;  font-size: 15px; }

    /* Items Table — moved up 0.55in from 4.25 */
    .items-table {
      position: absolute;
      top: 3.70in;
      left: 0.43in;
      width: 7.55in;
    }
    .items-table table { width: 100%; border-collapse: collapse; }
    .items-table td { height: 0.29in; vertical-align: middle; }
    .items-table .col-desc  { width: 55%; }
    .items-table td:first-child { padding-left: 0.40in !important; }
    .items-table .col-qty   { width: 11%; text-align: center; }
    .items-table .col-price { width: 16%; text-align: right; }
    .items-table .col-amt   { width: 18%; text-align: right; }

    /* Tax Left — moved up 0.55in */
    .vatable-sales   { position: absolute; top: 7.55in; left: 2.50in; font-size: 15px; text-align: right; width: 1.3in; }
    .vat-amount-left { position: absolute; top: 7.82in; left: 2.50in; font-size: 15px; text-align: right; width: 1.3in; }
    .zero-rated      { position: absolute; top: 8.09in; left: 2.50in; font-size: 15px; text-align: right; width: 1.3in; }
    .vat-exempt      { position: absolute; top: 8.36in; left: 2.50in; font-size: 15px; text-align: right; width: 1.3in; }

    /* Tax Right — moved up 0.55in */
    .total-vat-incl  { position: absolute; top: 7.55in; left: 6.10in; font-size: 15px; text-align: right; width: 1.8in; }
    .less-vat        { position: absolute; top: 7.82in; left: 6.10in; font-size: 15px; text-align: right; width: 1.8in; }
    .net-of-vat      { position: absolute; top: 8.09in; left: 6.10in; font-size: 15px; text-align: right; width: 1.8in; }
    .less-discount   { position: absolute; top: 8.46in; left: 6.10in; font-size: 15px; text-align: right; width: 1.8in; }
    .add-vat         { position: absolute; top: 8.73in; left: 6.10in; font-size: 15px; text-align: right; width: 1.8in; }
    .less-withholding { position: absolute; top: 9.01in; left: 6.10in; font-size: 15px; text-align: right; width: 1.8in; }
    .total-due       { position: absolute; top: 9.35in; left: 6.10in; font-size: 15px; font-weight: bold; text-align: right; width: 1.8in; }
  </style>
</head>
<body>
  <div class="bg-template">
    <img src="./invoice-template.png.jpg" alt="template" />
  </div>

  <div class="date-field">03/05/2026</div>
  <div class="reg-name">John Mark Dingasan</div>
  <div class="tin-field">999-999-999-00000</div>
  <div class="address">San Celestino Lipa City</div>

  <div class="items-table">
    <table>
      <colgroup>
        <col class="col-desc" />
        <col class="col-qty" />
        <col class="col-price" />
        <col class="col-amt" />
      </colgroup>
      <tr>
        <td style="padding:1px 4px; font-size:15px">Ecopia EP150</td>
        <td style="padding:1px 4px; font-size:15px; text-align:center">2</td>
        <td style="padding:1px 4px; font-size:15px; text-align:right">4,500.00</td>
        <td style="padding:1px 4px; font-size:15px; text-align:right">9,000.00</td>
      </tr>
      <tr>
        <td style="padding:1px 4px; font-size:15px">Mag Wheels 17"</td>
        <td style="padding:1px 4px; font-size:15px; text-align:center">2</td>
        <td style="padding:1px 4px; font-size:15px; text-align:right">23,223.00</td>
        <td style="padding:1px 4px; font-size:15px; text-align:right">46,446.00</td>
      </tr>
      <tr>
        <td style="padding:1px 4px; font-size:15px">Accessories Kit</td>
        <td style="padding:1px 4px; font-size:15px; text-align:center">1</td>
        <td style="padding:1px 4px; font-size:15px; text-align:right">23,232.00</td>
        <td style="padding:1px 4px; font-size:15px; text-align:right">23,232.00</td>
      </tr>
    </table>
  </div>

  <div class="vatable-sales">70,248.21</div>
  <div class="vat-amount-left">8,429.79</div>
  <div class="zero-rated">0.00</div>
  <div class="vat-exempt">0.00</div>

  <div class="total-vat-incl">78,678.00</div>
  <div class="less-vat">8,429.79</div>
  <div class="net-of-vat">70,248.21</div>
  <div class="less-discount">0.00</div>
  <div class="add-vat">8,429.79</div>
  <div class="less-withholding">3,512.41</div>
  <div class="total-due">75,165.59</div>
</body>
</html>
